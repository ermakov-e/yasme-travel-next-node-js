services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yasme_travel
      POSTGRES_USER: yasme
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yasme -d yasme_travel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
